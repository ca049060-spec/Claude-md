# Analyst track-record dataset (v1 seed).
#
# This is the data the scoring engine measures. It is PUBLIC analyst-performance
# data (no personal info), gathered from public aggregators. It starts small on
# purpose — the plan is to "refine as we go": add more analysts and tie them to
# the specific stocks you hold, so the consensus can be re-weighted by who has
# actually earned the right to be trusted.
#
# Fields per analyst:
#   success_rate : fraction of past calls that made money (0-1)
#   avg_return   : average return per call (percent)
#   num_calls    : how many rated calls (drives statistical significance)
#   covers       : tickers from YOUR portfolio this analyst follows (optional)
source: "TipRanks / WallStreetZen analyst rankings (public), 2026"
