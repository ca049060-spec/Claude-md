<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ripple — an observatory of consequence</title>
<style>
  :root{
    --bg:#070a10; --bg2:#0b1019; --panel:#0e141f; --line:#1d2735; --ink:#eaf1fa; --dim:#8094ac;
    --teal:#5fe3d2; --o1:#ffffff; --o2:#a7e6ff; --o3:#ffd98a; --o4:#ff9bbf;
    --up:#7aa2ff; --down:#74e6a4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(1200px 700px at 60% -10%,#0f1726,var(--bg));
    color:var(--ink);font:15px/1.55 ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{padding:13px 22px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  h1{margin:0;font-size:18px;font-weight:650;letter-spacing:.3px}
  h1 .glow{color:var(--teal);text-shadow:0 0 18px rgba(95,227,210,.45)}
  header p{margin:0;color:var(--dim);font-size:12.5px}
  #picker{display:flex;gap:7px;flex-wrap:wrap;padding:11px 18px;border-bottom:1px solid var(--line)}
  .chip{cursor:pointer;border:1px solid var(--line);background:#0c121c;color:var(--ink);
    padding:6px 11px;border-radius:22px;font-size:12.5px;white-space:nowrap;transition:.18s}
  .chip .yr{color:var(--dim);font-size:10.5px;margin-left:6px}
  .chip:hover{transform:translateY(-1px);border-color:var(--teal)}
  .chip.active{background:linear-gradient(180deg,#123,#0c121c);border-color:var(--teal);box-shadow:0 0 0 1px var(--teal) inset,0 6px 22px -10px var(--teal)}
  #wrap{display:flex;height:calc(100% - 116px);min-height:520px}
  #left{flex:1 1 auto;display:flex;flex-direction:column;min-width:0}
  #stage{flex:1 1 auto;position:relative;min-height:300px}
  svg{width:100%;height:100%;display:block}
  .flabel{font-size:12px;fill:var(--dim);pointer-events:none}
  .fnode{cursor:pointer}
  .fnode .halo{fill:var(--teal);opacity:0;transition:opacity .5s}
  .fnode circle.core{fill:#121a27;stroke:#26344a;stroke-width:1.5;transition:.35s}
  .fnode:hover circle.core{stroke:var(--teal)}
  .fnode.lit circle.core{fill:#16273a}
  .edge{fill:none;stroke-linecap:round;opacity:.9}
  .hint{fill:var(--dim);font-size:13px;text-anchor:middle;letter-spacing:.3px}
  #controls{display:flex;align-items:center;gap:14px;padding:8px 18px;border-top:1px solid var(--line);color:var(--dim);font-size:12px}
  .btn{cursor:pointer;border:1px solid var(--line);background:#0c121c;color:var(--ink);border-radius:8px;padding:5px 12px;font-size:12.5px}
  .btn:hover{border-color:var(--teal)}
  .leg{display:flex;gap:12px;margin-left:auto;flex-wrap:wrap}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  /* lineage ribbon */
  #ribbon{display:flex;align-items:center;gap:10px;padding:9px 18px;border-top:1px solid var(--line);
    overflow-x:auto;white-space:nowrap;min-height:48px}
  .rib{cursor:pointer;border:1px solid var(--line);background:#0c121c;border-radius:8px;padding:5px 10px;font-size:12px}
  .rib.up{border-color:var(--up)} .rib.down{border-color:var(--down)} .rib.cur{background:#13202f;border-color:var(--teal);font-weight:600}
  .rib .mini{color:var(--dim);font-size:10.5px;display:block;max-width:200px;overflow:hidden;text-overflow:ellipsis}
  .ar{color:var(--dim)} .ar.u{color:var(--up)} .ar.d{color:var(--down)}
  /* narration */
  #side{flex:0 0 372px;max-width:44%;background:linear-gradient(180deg,var(--panel),var(--bg2));
    border-left:1px solid var(--line);overflow:auto;padding:20px}
  #side h2{margin:0;font-size:19px} #side .sub{color:var(--dim);font-size:12.5px;margin:2px 0 12px}
  .lede{font-size:13.5px;color:#cdd9e8;margin-bottom:6px}
  .step{display:flex;gap:11px;padding:11px 0;border-top:1px solid var(--line);
    opacity:0;transform:translateY(8px);transition:opacity .5s ease,transform .5s ease}
  .step.show{opacity:1;transform:none}
  .ob{flex:0 0 24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:800;color:#06221f}
  .o1{background:var(--o1)} .o2{background:var(--o2)} .o3{background:var(--o3)} .o4{background:var(--o4)}
  .ftag{display:inline-block;font-size:11px;color:var(--teal);border:1px solid var(--line);border-radius:10px;padding:1px 8px;margin-bottom:3px}
  .note{background:#0a0f17;border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--dim);font-size:12px;margin-top:16px}
  .muted{color:var(--dim)}
</style>
</head>
<body>
<header>
  <h1>Ripple <span class="glow">◍</span> <span style="font-weight:400;color:var(--dim);font-size:13px">an observatory of consequence</span></h1>
  <p>Pick a moment. Watch the consequence breathe outward — first-order to fourth — across the facets of a life. The strip below holds its lineage: what made it possible, what it set in motion.</p>
</header>

<div id="picker"></div>

<div id="wrap">
  <div id="left">
    <div id="stage">
      <svg id="svg" viewBox="0 0 1000 580" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/></marker>
          <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g id="edges"></g>
        <g id="nodes"></g>
        <text id="hint" class="hint" x="500" y="295">⟡ choose a moment above</text>
      </svg>
    </div>
    <div id="controls">
      <span class="btn" id="play">↻ replay</span>
      <span id="caption" class="muted">the observatory is still</span>
      <span class="leg">
        <span><span class="dot" style="background:var(--o1)"></span>1st</span>
        <span><span class="dot" style="background:var(--o2)"></span>2nd</span>
        <span><span class="dot" style="background:var(--o3)"></span>3rd</span>
        <span><span class="dot" style="background:var(--o4)"></span>4th+</span>
      </span>
    </div>
    <div id="ribbon"></div>
  </div>
  <div id="side"><div id="sc"></div></div>
</div>

<script>
const FACETS=["Technology","Markets","Industries","Media & Content","Daily Life","Social","Work & Labor","Health","Policy & Power"];
const EVENTS=[
 {id:"net",name:"Internet / Web",year:1995,color:"#8ad0ff",summary:"The graphical web turned the internet into a place anyone could use — the substrate everything later stood on.",
  steps:[{o:1,f:"Technology",t:"The browser makes the internet usable by everyone."},{o:2,f:"Media & Content",t:"News, information and shopping move online; publishing is disintermediated."},{o:2,f:"Markets",t:"The dot-com boom and 2000 bust — capital floods 'online everything.'"},{o:3,f:"Work & Labor",t:"Email and a website become baseline business infrastructure."},{o:3,f:"Daily Life",t:"Looking things up, mapping and messaging migrate to a screen."},{o:4,f:"Social",t:"Communities form around interests instead of geography."}]},
 {id:"amazon",name:"Amazon / E-commerce",year:1997,color:"#ff9e54",summary:"The 'everything store' turned retail into a logistics problem — and its own plumbing became the cloud.",
  steps:[{o:1,f:"Industries",t:"'Everything store' + logistics turn retail into a delivery problem."},{o:2,f:"Daily Life",t:"One-click buying and fast shipping reset expectations for convenience."},{o:2,f:"Markets",t:"Scale-over-margin reinvestment redefines what investors reward."},{o:3,f:"Work & Labor",t:"Warehouse, fulfillment and gig-delivery labor scale massively."},{o:3,f:"Industries",t:"Mall and main-street retail decline — the 'retail apocalypse.'"},{o:4,f:"Technology",t:"Renting out its own infrastructure becomes AWS — the cloud."}]},
 {id:"google",name:"Google / Search",year:1998,color:"#9fd3ff",summary:"Making the web searchable turned discovery — and the ad auction behind it — into gatekeeping power.",
  steps:[{o:1,f:"Technology",t:"PageRank makes the chaotic web instantly searchable."},{o:2,f:"Daily Life",t:"'Google it' becomes a reflex; memory offloads to search."},{o:2,f:"Markets",t:"Search advertising invents the modern attention-auction model."},{o:3,f:"Industries",t:"Discovery shifts to whoever ranks; SEO and ad-tech form."},{o:3,f:"Media & Content",t:"Publishers come to depend on the algorithm."},{o:4,f:"Policy & Power",t:"A few gatekeepers shape what information people see."}]},
 {id:"ipod",name:"iPod + iTunes",year:2001,color:"#6fd3c7",summary:"A player plus a store made the music library portable — and quietly invented Apple's platform playbook.",
  steps:[{o:1,f:"Technology",t:"'1,000 songs in your pocket' — a portable digital library."},{o:2,f:"Media & Content",t:"iTunes (2003) sells songs at $0.99, unbundling the album."},{o:2,f:"Industries",t:"Labels lose the bundle and pricing power; CD retail declines."},{o:3,f:"Markets",t:"Apple pivots toward consumer devices — a historic re-rating begins."},{o:3,f:"Daily Life",t:"Listening turns individual; the mixtape becomes the playlist."},{o:4,f:"Technology",t:"Device + store + library becomes the template for the iPhone."}]},
 {id:"cloud",name:"Cloud / AWS",year:2006,color:"#c0a6ff",summary:"Computing became rentable by the hour — letting anyone scale globally, and massing the compute that later trained AI.",
  steps:[{o:1,f:"Technology",t:"Computing becomes rentable by the hour — no server room."},{o:2,f:"Industries",t:"A startup scales globally on a credit card; 'software eats the world.'"},{o:2,f:"Markets",t:"Recurring-revenue SaaS becomes the dominant tech model."},{o:3,f:"Work & Labor",t:"DevOps, data and platform roles reshape the workforce."},{o:3,f:"Technology",t:"Compute concentrates in a handful of hyperscalers."},{o:4,f:"Technology",t:"The substrate that later makes large-scale AI training possible."}]},
 {id:"iphone",name:"iPhone / Smartphone",year:2007,color:"#7aa2ff",summary:"A pocket computer with an app store became the remote control for daily life and rewired dozens of industries.",
  steps:[{o:1,f:"Technology",t:"A pocket touchscreen computer; the App Store (2008) makes it a platform."},{o:2,f:"Industries",t:"Taxis, hotels, banking, retail and dating each get an app layer."},{o:2,f:"Work & Labor",t:"Always-on connectivity blurs work and home."},{o:3,f:"Social",t:"Presence becomes continuous — texting, photos, location."},{o:3,f:"Markets",t:"Mobile becomes the dominant computing market (iOS/Android)."},{o:4,f:"Daily Life",t:"The phone becomes maps, wallet, camera, ID and remote for everything."}]},
 {id:"netflix",name:"Netflix Streaming",year:2007,color:"#ff7a7a",summary:"On-demand streaming dissolved the broadcast schedule and set off a global content arms race.",
  steps:[{o:1,f:"Media & Content",t:"Instant streaming — flat-fee, ad-free, anytime."},{o:2,f:"Industries",t:"Binge-watching and cord-cutting erode the cable bundle."},{o:2,f:"Markets",t:"'Streaming wars' — every studio launches a service; content spend explodes."},{o:3,f:"Work & Labor",t:"Demand for originals reshapes Hollywood and builds global studios."},{o:3,f:"Daily Life",t:"'Appointment TV' dies; viewing is individual and on your schedule."},{o:4,f:"Social",t:"The recommendation engine shapes shared taste; global hits cross borders."}]},
 {id:"social",name:"Social Media",year:2008,color:"#b98bff",summary:"Network platforms turned everyone into a publisher and made attention the asset the economy runs on.",
  steps:[{o:1,f:"Technology",t:"The feed, the follow and the like turn every user into a publisher."},{o:2,f:"Social",t:"Identity, status and relationships move onto the 'social graph.'"},{o:2,f:"Media & Content",t:"Attention and ad dollars shift to platforms and creators."},{o:3,f:"Policy & Power",t:"Protest, politics and misinformation run on virality."},{o:3,f:"Health",t:"Always-on comparison and outrage correlate with rising anxiety."},{o:4,f:"Markets",t:"Targeted attention becomes the asset — trillion-dollar platforms."}]},
 {id:"gfc",name:"2008 Financial Crisis",year:2008,color:"#ffb454",summary:"A credit shock — rates and lending seize, projects stall, and the effects cascade across society for a decade.",
  steps:[{o:1,f:"Markets",t:"Subprime collapse → credit freezes → banks fail (Lehman)."},{o:2,f:"Industries",t:"Borrowing power evaporates; housing and construction contract; projects shelved."},{o:2,f:"Work & Labor",t:"Mass unemployment; a generation's wealth and careers delayed."},{o:3,f:"Policy & Power",t:"Zero rates, QE and bailouts — central banks become permanent players."},{o:3,f:"Social",t:"Trust in institutions falls; Occupy, populism and inequality rise."},{o:4,f:"Markets",t:"A decade of cheap money inflates housing, tech and assets."}]},
 {id:"uber",name:"Uber / Gig Economy",year:2010,color:"#5ad1a0",summary:"Phone + GPS + payments turned 'summon anything on demand' into a new — and contested — kind of work.",
  steps:[{o:1,f:"Technology",t:"Phone + GPS + payments = summon a car (or anything) on demand."},{o:2,f:"Work & Labor",t:"'Gig' work — flexible, app-dispatched, without employee protections."},{o:2,f:"Industries",t:"Taxis, logistics, food and errands get platform intermediaries."},{o:3,f:"Policy & Power",t:"Worker-classification fights and city regulation battles."},{o:3,f:"Daily Life",t:"On-demand convenience becomes the default expectation."},{o:4,f:"Markets",t:"Blitz-scaling on venture cash — growth before profit."}]},
 {id:"covid",name:"COVID-19",year:2020,color:"#7fe08a",summary:"A health shock that compressed a decade of behavior change into months and reset the macro regime.",
  steps:[{o:1,f:"Health",t:"A global pandemic forces lockdowns and distancing."},{o:2,f:"Daily Life",t:"Home becomes office, school, gym and theatre overnight."},{o:2,f:"Work & Labor",t:"Remote and hybrid work normalize; the commute is renegotiated."},{o:3,f:"Industries",t:"E-commerce, delivery and streaming surge; travel and downtown retail crater."},{o:3,f:"Markets",t:"Crash → record stimulus → asset boom; supply chains seize, then inflation."},{o:4,f:"Policy & Power",t:"Deficits and money-printing reset the macro regime."}]},
 {id:"genai",name:"Generative AI",year:2022,color:"#5ad1e6",summary:"General-purpose AI crossed a public threshold, triggering a capex supercycle and a rethink of knowledge work.",
  steps:[{o:1,f:"Technology",t:"Usable general-purpose AI in a chat box; capability crosses a threshold."},{o:2,f:"Work & Labor",t:"Writing, coding, support and design begin to be augmented and automated."},{o:2,f:"Industries",t:"A capex supercycle in chips, data centers and power."},{o:3,f:"Markets",t:"AI becomes the dominant market theme; a few names drive returns."},{o:3,f:"Media & Content",t:"Content becomes near-free to produce — truth and authorship in question."},{o:4,f:"Daily Life",t:"How we search, learn and create starts to shift."}]}
];
const LINKS=[
 ["net","google","the web needs organizing"],["net","amazon","retail moves online"],["net","netflix","broadband enables streaming"],
 ["amazon","cloud","its own infra became a product"],["ipod","iphone","the platform playbook"],
 ["iphone","social","mobile makes social always-on"],["iphone","uber","GPS + payments in your pocket"],["iphone","netflix","viewing goes mobile"],
 ["cloud","uber","apps run on the cloud"],["cloud","genai","rentable compute trains the models"],["google","genai","deep-learning + Transformer research"],
 ["gfc","covid","a decade of cheap money set the stage"],["covid","genai","digital acceleration + a flood of capital"]
].map(([from,to,l])=>({from,to,l}));

const byId=Object.fromEntries(EVENTS.map(e=>[e.id,e]));
const NS="http://www.w3.org/2000/svg";
const $=id=>document.getElementById(id);
const gEdges=$("edges"),gNodes=$("nodes"),hint=$("hint"),sc=$("sc"),caption=$("caption");
let selected=null,timers=[];
const mk=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};

const CX=500,CY=270,R=205,pos={};
FACETS.forEach((f,i)=>{const a=(-90+i*360/FACETS.length)*Math.PI/180;pos[f]={x:CX+R*Math.cos(a),y:CY+R*Math.sin(a)};});
FACETS.forEach(f=>{const p=pos[f];const g=mk("g",{class:"fnode"});g.dataset.f=f;
  g.appendChild(mk("circle",{class:"halo",cx:p.x,cy:p.y,r:20,filter:"url(#soft)"}));
  g.appendChild(mk("circle",{class:"core",cx:p.x,cy:p.y,r:11}));
  const anc=p.x<CX-5?"end":(p.x>CX+5?"start":"middle");
  const t=mk("text",{x:p.x+(p.x-CX)*0.13,y:p.y+(p.y-CY)*0.13+4,class:"flabel","text-anchor":anc});t.textContent=f;
  g.appendChild(t);gNodes.appendChild(g);});
const OCOL={1:"#ffffff",2:"#a7e6ff",3:"#ffd98a",4:"#ff9bbf"};
const curve=(a,b)=>{const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;return `M${a.x},${a.y} Q${mx+(CX-mx)*0.5},${my+(CY-my)*0.5} ${b.x},${b.y}`;};

function clearAll(){timers.forEach(clearTimeout);timers=[];gEdges.innerHTML="";
  document.querySelectorAll(".fnode").forEach(n=>{n.classList.remove("lit");n.querySelector(".halo").style.opacity=0;});
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));}

function litFacet(f,color){const n=document.querySelector(`.fnode[data-f="${f}"]`);if(!n)return;
  n.classList.add("lit");const h=n.querySelector(".halo");h.setAttribute("fill",color);h.style.opacity=.55;
  setTimeout(()=>{h.style.opacity=.25;},600);}

function flow(fa,fb,color,order){const d=curve(pos[fa],pos[fb]);
  const p=mk("path",{class:"edge",d,stroke:color,"stroke-width":Math.max(1.4,3.6-order*0.5),"marker-end":"url(#ah)",opacity:0});
  p.style.color=color;gEdges.appendChild(p);const len=p.getTotalLength();
  p.style.strokeDasharray=len;p.style.strokeDashoffset=len;p.getBoundingClientRect();
  p.style.transition="stroke-dashoffset .7s ease, opacity .3s";p.style.opacity=.9;p.style.strokeDashoffset=0;
  const dot=mk("circle",{r:3.4,fill:color,filter:"url(#soft)"});
  const am=mk("animateMotion",{dur:"1.7s",repeatCount:"indefinite",path:d});dot.appendChild(am);gEdges.appendChild(dot);}

function play(){const ev=byId[selected];if(!ev)return;
  timers.forEach(clearTimeout);timers=[];gEdges.innerHTML="";
  document.querySelectorAll(".fnode").forEach(n=>{n.classList.remove("lit");n.querySelector(".halo").style.opacity=0;});
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("show"));
  caption.textContent="watching "+ev.name+" ripple outward…";
  let prev=null;
  ev.steps.forEach((s,i)=>{timers.push(setTimeout(()=>{
    litFacet(s.f,ev.color);
    if(prev&&prev!==s.f)flow(prev,s.f,ev.color,s.o);
    prev=s.f;
    const stp=document.querySelector(`.step[data-i="${i}"]`);if(stp)stp.classList.add("show");
    if(i===ev.steps.length-1)caption.textContent="↻ replay, or follow a thread below";
  },350+i*900));});}

function select(id){selected=id;clearAll();hint.style.display="none";
  document.querySelector(`.chip[data-id="${id}"]`)?.classList.add("active");
  const ev=byId[id];
  let h=`<h2>${ev.name}</h2><div class="sub">${ev.year}</div><div class="lede">${ev.summary}</div>`;
  ev.steps.forEach((s,i)=>h+=`<div class="step" data-i="${i}"><div class="ob o${Math.min(s.o,4)}">${s.o}</div>
    <div><span class="ftag">${s.f}</span><div>${s.t}</div></div></div>`);
  h+=`<div class="note">Read it as a breath: a direct effect ① becomes someone else's knock-on ②, then a society-wide ripple ③–④. The strip below the web is the <b>lineage</b> — what enabled this, and what it set in motion.</div>`;
  sc.innerHTML=h;ribbon(ev);play();}

function ribbon(ev){const r=$("ribbon");
  const ins=LINKS.filter(l=>l.to===ev.id),outs=LINKS.filter(l=>l.from===ev.id);
  let h="";
  ins.forEach(l=>h+=`<span class="rib up" data-go="${l.from}"><b>${byId[l.from].name}</b><span class="mini">${l.l}</span></span><span class="ar u">⟶</span>`);
  h+=`<span class="rib cur"><b>${ev.name}</b><span class="mini">${ev.year}</span></span>`;
  outs.forEach(l=>h+=`<span class="ar d">⟶</span><span class="rib down" data-go="${l.to}"><b>${byId[l.to].name}</b><span class="mini">${l.l}</span></span>`);
  if(!ins.length&&!outs.length)h+=`<span class="mini" style="margin-left:8px">no mapped lineage</span>`;
  r.innerHTML=h;
  r.querySelectorAll(".rib[data-go]").forEach(el=>el.addEventListener("click",()=>select(el.dataset.go)));}

function idle(){selected=null;clearAll();hint.style.display="";caption.textContent="the observatory is still";
  $("ribbon").innerHTML=`<span class="mini">pick a moment — its lineage will appear here</span>`;
  sc.innerHTML=`<h2>The observatory is still</h2><div class="sub">choose a moment above</div>
   <div class="lede">Every change arrives somewhere specific, then leaks outward. This watches that leak — across nine facets of a life, one order of consequence at a time.</div>
   <div class="note">A hand-built reading of well-documented history. It is here to help you <i>see</i> how things involve each other — not to predict them.</div>`;}

$("play").addEventListener("click",()=>{if(selected)play();});
const pk=$("picker");
[...EVENTS].sort((a,b)=>a.year-b.year).forEach(ev=>{const c=document.createElement("div");
  c.className="chip";c.dataset.id=ev.id;c.style.borderLeft=`3px solid ${ev.color}`;
  c.innerHTML=`${ev.name}<span class="yr">${ev.year}</span>`;
  c.addEventListener("click",()=>select(ev.id));pk.appendChild(c);});
idle();
</script>
</body>
</html>
